name: E2E (live Pages)

# Runs the Playwright suite against the deployed GitHub Pages site at
# https://jason-pham.github.io/rem-waste/ across four browser projects.
#
# Triggers:
#   - workflow_run: fires after "Deploy to GitHub Pages" completes, so every
#     push to main is covered once the fresh bundle is actually live.
#   - schedule:     daily at 06:00 UTC — catches drift from external sources.
#   - workflow_dispatch: manual re-run button.

on:
  workflow_run:
    workflows: ['Deploy to GitHub Pages']
    types: [completed]
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  LIVE_URL: https://jason-pham.github.io/rem-waste/

jobs:
  # -------------------------------------------------------------------------
  # unit-tests — fast fail gate: strict typecheck on both packages.
  # -------------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            automation/package-lock.json

      - name: Install ui deps
        working-directory: ui
        run: npm ci

      - name: Typecheck ui (tsc --noEmit)
        working-directory: ui
        run: npx tsc --noEmit

      - name: Install automation deps
        working-directory: automation
        run: npm ci

      - name: Typecheck automation (tsc --noEmit)
        working-directory: automation
        run: npx tsc --noEmit

  # -------------------------------------------------------------------------
  # e2e-tests — full Playwright suite against the deployed Pages URL,
  # fanned out across four browser projects.
  # -------------------------------------------------------------------------
  e2e-tests:
    needs: unit-tests
    # On workflow_run, only proceed if the deploy actually succeeded.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            label: 'E2E — Chromium'
            browsers: 'chromium'
          - project: firefox
            label: 'E2E — Firefox'
            browsers: 'firefox'
          - project: webkit
            label: 'E2E — WebKit'
            browsers: 'webkit'
          - project: mobile-chrome
            label: 'E2E — Mobile Chrome'
            browsers: 'chromium'

    name: ${{ matrix.label }}

    defaults:
      run:
        working-directory: automation

    env:
      BASE_URL: https://jason-pham.github.io/rem-waste/
      PROJECTS: ${{ matrix.project }}
      CI: 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - run: npm ci

      - name: Install Playwright browser (${{ matrix.browsers }})
        run: npx playwright install ${{ matrix.browsers }} --with-deps

      - name: Run Playwright tests
        run: >-
          npx playwright test
          tests/e2e
          tests/api

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.run_id }}
          path: automation/playwright-report
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-${{ matrix.project }}-${{ github.run_id }}
          path: automation/results.xml
          retention-days: 14

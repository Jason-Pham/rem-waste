services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rem-waste-ui
    container_name: rem-waste-ui
    ports:
      - "4173:4173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
